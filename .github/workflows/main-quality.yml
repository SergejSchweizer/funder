name: main-quality

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  main-quality:
    name: main-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run required main merge gate
        run: uv run founder-quality main

      - name: Validate squash merge subject
        if: github.event_name == 'pull_request'
        env:
          SQUASH_SUBJECT: ${{ github.event.pull_request.title }}
        run: uv run founder-quality --squash-subject "$SQUASH_SUBJECT"
