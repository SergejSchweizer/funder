name: main-quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  main-quality:
    name: main-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run PR quality gate scope
        run: uv run founder-quality pr

      - name: Enforce main coverage threshold
        run: uv run pytest --cov=founder --cov-report=term-missing --cov-fail-under=95