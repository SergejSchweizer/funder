name: pr-quality

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  pr-quality:
    name: pr-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Run PR quality gate
        run: uv run founder-quality pr