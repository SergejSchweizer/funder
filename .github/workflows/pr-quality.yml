name: pr-quality

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTEST_SHARD_COUNT: 4

jobs:
  pr-static-quality:
    name: pr-static-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

      - name: Validate branch commit subjects
        run: uv run founder-quality --commits-only

      - name: Validate squash merge subject
        if: github.event_name == 'pull_request'
        env:
          SQUASH_SUBJECT: ${{ github.event.pull_request.title }}
        run: uv run founder-quality --squash-subject "$SQUASH_SUBJECT"

  pr-test-shards:
    name: pr-test-shard-${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Pytest shard
        run: >-
          uv run python scripts/pytest_shard.py
          --shard-index ${{ matrix.shard }}
          --shard-count ${PYTEST_SHARD_COUNT}
          --
          -q

  pr-quality:
    name: pr-quality
    runs-on: ubuntu-latest
    needs:
      - pr-static-quality
      - pr-test-shards
    if: always()

    steps:
      - name: Verify PR quality gates
        env:
          STATIC_RESULT: ${{ needs.pr-static-quality.result }}
          TEST_RESULT: ${{ needs.pr-test-shards.result }}
        run: |
          if [[ "$STATIC_RESULT" != "success" || "$TEST_RESULT" != "success" ]]; then
            echo "pr-quality failed: static=$STATIC_RESULT tests=$TEST_RESULT" >&2
            exit 1
          fi
          echo "pr-quality passed."
