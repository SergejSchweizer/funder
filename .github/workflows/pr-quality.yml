name: pr-quality

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTEST_SHARD_COUNT: 4

jobs:
  pr-lint-quality:
    name: pr-lint-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Validate branch commit subjects
        run: uv run founder-quality --commits-only

      - name: Validate squash merge subject
        if: github.event_name == 'pull_request'
        env:
          SQUASH_SUBJECT: ${{ github.event.pull_request.title }}
        run: uv run founder-quality --squash-subject "$SQUASH_SUBJECT"

  pr-type-quality:
    name: pr-type-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Pyright
        run: uv run pyright

  pr-unit-tests:
    name: pr-unit-tests-${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Unit test shard
        run: >-
          uv run python scripts/pytest_shard.py
          --suite unit
          --shard-index ${{ matrix.shard }}
          --shard-count ${PYTEST_SHARD_COUNT}
          --
          -q
          -n auto

  pr-integration-tests:
    name: pr-integration-tests-${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Integration test shard
        run: >-
          uv run python scripts/pytest_shard.py
          --suite integration
          --shard-index ${{ matrix.shard }}
          --shard-count ${PYTEST_SHARD_COUNT}
          --
          -q
          -n auto

  pr-quality:
    name: pr-quality
    runs-on: ubuntu-latest
    needs:
      - pr-lint-quality
      - pr-type-quality
      - pr-unit-tests
      - pr-integration-tests
    if: always()

    steps:
      - name: Verify PR quality gates
        env:
          LINT_RESULT: ${{ needs.pr-lint-quality.result }}
          TYPE_RESULT: ${{ needs.pr-type-quality.result }}
          UNIT_RESULT: ${{ needs.pr-unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.pr-integration-tests.result }}
        run: |
          if [[ "$LINT_RESULT" != "success" || "$TYPE_RESULT" != "success" || "$UNIT_RESULT" != "success" || "$INTEGRATION_RESULT" != "success" ]]; then
            echo "pr-quality failed: lint=$LINT_RESULT type=$TYPE_RESULT unit=$UNIT_RESULT integration=$INTEGRATION_RESULT" >&2
            exit 1
          fi
          echo "pr-quality passed."
