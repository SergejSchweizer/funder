name: auto-merge

on:
  workflow_run:
    workflows: [merge-gate]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: merge
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0] &&
      github.event.workflow_run.head_repository.full_name == github.repository

    steps:
      - name: Merge passing PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          IS_DRAFT="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)"
          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "PR $PR_NUMBER is still a draft; skipping auto-merge."
            exit 0
          fi
          PR_TITLE="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json title --jq .title)"
          CONVENTIONAL_PATTERN='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9][a-z0-9-]*\))?(!)?: .+'
          if [[ ! "$PR_TITLE" =~ $CONVENTIONAL_PATTERN ]]; then
            echo "Invalid squash subject: $PR_TITLE" >&2
            exit 1
          fi
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --delete-branch --subject "$PR_TITLE"
