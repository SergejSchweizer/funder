repos:
  - repo: local
    hooks:
      - id: founder-quality-pr
        name: founder quality pr
        entry: uv run founder-quality pr
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: founder-conventional-commit
        name: founder conventional commit
        entry: uv run founder-quality --commit-msg-file
        language: system
        stages: [commit-msg]