name: camovar

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: camovar
      POSTGRES_USER: camovar_app
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_password
    volumes:
      - camovar-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camovar_app -d camovar"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - camovar-internal
    expose:
      - "5432"
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      CAMOVAR_ENV: development
      CAMOVAR_DATABASE_URL: postgresql://camovar_app@postgres:5432/camovar
      CAMOVAR_SHARED_DATA_ROOT: /srv/camovar/shared-data
      CAMOVAR_LAKE_ROOT: /srv/camovar/lake
      CAMOVAR_SESSION_SECRET_FILE: /run/secrets/session_secret
      CAMOVAR_EODHD_KEK_FILE: /run/secrets/eodhd_kek
      CAMOVAR_GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_client_secret
    secrets:
      - session_secret
      - eodhd_kek
      - google_client_secret
    volumes:
      - camovar-shared-data:/srv/camovar/shared-data
      - ./lake:/srv/camovar/lake
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "0.0.0.0:${CAMOVAR_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-m", "camovar.hosted_runtime", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - camovar-internal
      - camovar-public
    group_add:
      - "${CAMOVAR_LAKE_GROUP_ID:-10}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    develop:
      watch:
        - action: rebuild
          path: ./apps/web
        - action: rebuild
          path: ./apps/web/Dockerfile
        - action: rebuild
          path: ./compose.yaml
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CAMOVAR_API_BASE_URL: http://api:8000
      CAMOVAR_AUTH_MODE: ${CAMOVAR_AUTH_MODE:-google}
      CAMOVAR_GOOGLE_CLIENT_ID: ${CAMOVAR_GOOGLE_CLIENT_ID:-}
      CAMOVAR_GOOGLE_REDIRECT_URI: ${CAMOVAR_GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/google/callback}
      CAMOVAR_GOOGLE_ALLOWED_DOMAIN: ${CAMOVAR_GOOGLE_ALLOWED_DOMAIN:-}
      CAMOVAR_LOCAL_DEV_GOOGLE_EMAIL: ${CAMOVAR_LOCAL_DEV_GOOGLE_EMAIL:-local-google-dev-user@example.test}
      CAMOVAR_GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_client_secret
    secrets:
      - google_client_secret
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "0.0.0.0:${CAMOVAR_WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "server.js", "--health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - camovar-public
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

networks:
  camovar-internal:
    internal: true
  camovar-public:

volumes:
  camovar-postgres-data:
  camovar-shared-data:

secrets:
  postgres_password:
    file: ${CAMOVAR_POSTGRES_PASSWORD_FILE:?set an absolute external secret path}
  session_secret:
    file: ${CAMOVAR_SESSION_SECRET_FILE:?set an absolute external secret path}
  eodhd_kek:
    file: ${CAMOVAR_EODHD_KEK_FILE:?set an absolute external secret path}
  google_client_secret:
    file: ${CAMOVAR_GOOGLE_CLIENT_SECRET_FILE:?set an absolute external secret path}
