name: founder

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: founder
      POSTGRES_USER: founder_app
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_password
    volumes:
      - founder-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U founder_app -d founder"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - founder-internal
    expose:
      - "5432"
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      FOUNDER_ENV: development
      FOUNDER_DATABASE_URL: postgresql://founder_app@postgres:5432/founder
      FOUNDER_SHARED_DATA_ROOT: /srv/founder/shared-data
      FOUNDER_LAKE_ROOT: /srv/founder/lake
      FOUNDER_SESSION_SECRET_FILE: /run/secrets/session_secret
      FOUNDER_EODHD_KEK_FILE: /run/secrets/eodhd_kek
      FOUNDER_GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_client_secret
    secrets:
      - session_secret
      - eodhd_kek
      - google_client_secret
    volumes:
      - founder-shared-data:/srv/founder/shared-data
      - ./lake:/srv/founder/lake
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "0.0.0.0:${FOUNDER_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-m", "founder.hosted_runtime", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - founder-internal
      - founder-public
    group_add:
      - "${FOUNDER_LAKE_GROUP_ID:-10}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    develop:
      watch:
        - action: rebuild
          path: ./apps/web
        - action: rebuild
          path: ./apps/web/Dockerfile
        - action: rebuild
          path: ./compose.yaml
    restart: unless-stopped
    environment:
      NODE_ENV: development
      FOUNDER_API_BASE_URL: http://api:8000
      FOUNDER_AUTH_MODE: ${FOUNDER_AUTH_MODE:-google}
      FOUNDER_GOOGLE_CLIENT_ID: ${FOUNDER_GOOGLE_CLIENT_ID:-}
      FOUNDER_GOOGLE_REDIRECT_URI: ${FOUNDER_GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/google/callback}
      FOUNDER_GOOGLE_ALLOWED_DOMAIN: ${FOUNDER_GOOGLE_ALLOWED_DOMAIN:-}
      FOUNDER_LOCAL_DEV_GOOGLE_EMAIL: ${FOUNDER_LOCAL_DEV_GOOGLE_EMAIL:-local-google-dev-user@example.test}
      FOUNDER_GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_client_secret
    secrets:
      - google_client_secret
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "0.0.0.0:${FOUNDER_WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "server.js", "--health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - founder-public
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

networks:
  founder-internal:
    internal: true
  founder-public:

volumes:
  founder-postgres-data:
  founder-shared-data:

secrets:
  postgres_password:
    file: ${FOUNDER_POSTGRES_PASSWORD_FILE:?set an absolute external secret path}
  session_secret:
    file: ${FOUNDER_SESSION_SECRET_FILE:?set an absolute external secret path}
  eodhd_kek:
    file: ${FOUNDER_EODHD_KEK_FILE:?set an absolute external secret path}
  google_client_secret:
    file: ${FOUNDER_GOOGLE_CLIENT_SECRET_FILE:?set an absolute external secret path}
